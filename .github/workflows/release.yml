name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: PromptRewrite.exe
            asset_name: PromptRewrite-windows.exe
          - os: macos-latest
            artifact_name: PromptRewrite
            asset_name: PromptRewrite-macos
          - os: ubuntu-latest
            artifact_name: PromptRewrite
            asset_name: PromptRewrite-linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[web]"

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: >
          pyinstaller
          --name PromptRewrite
          --onefile
          --noconsole
          --add-data "index.html;."
          --add-data "src/prompt_rewrite/templates/*.yaml;prompt_rewrite/templates"
          --hidden-import prompt_rewrite
          --hidden-import prompt_rewrite.core
          --hidden-import prompt_rewrite.core.analyzer
          --hidden-import prompt_rewrite.core.pipeline
          --hidden-import prompt_rewrite.core.types
          --hidden-import prompt_rewrite.core.workflow_defs
          --hidden-import prompt_rewrite.strategies
          --hidden-import prompt_rewrite.strategies.base
          --hidden-import prompt_rewrite.strategies.role_enhancer
          --hidden-import prompt_rewrite.strategies.structure_formatter
          --hidden-import prompt_rewrite.strategies.chain_of_thought
          --hidden-import prompt_rewrite.strategies.constraint_injector
          --hidden-import prompt_rewrite.strategies.output_formatter
          --hidden-import prompt_rewrite.strategies.example_formatter
          --hidden-import prompt_rewrite.strategies.context_optimizer
          --hidden-import prompt_rewrite.llm
          --hidden-import prompt_rewrite.llm.deepseek_client
          --hidden-import prompt_rewrite.llm.llm_analyzer
          --hidden-import prompt_rewrite.llm.llm_strategies
          --hidden-import uvicorn
          --hidden-import uvicorn.logging
          --hidden-import uvicorn.loops
          --hidden-import uvicorn.loops.auto
          --hidden-import uvicorn.protocols
          --hidden-import uvicorn.protocols.http
          --hidden-import uvicorn.protocols.http.auto
          --hidden-import uvicorn.protocols.websockets
          --hidden-import uvicorn.protocols.websockets.auto
          --hidden-import uvicorn.lifespan
          --hidden-import uvicorn.lifespan.on
          --hidden-import fastapi
          --hidden-import pydantic
          launch_ui.py

      - name: Build with PyInstaller (macOS / Linux)
        if: runner.os != 'Windows'
        run: >
          pyinstaller
          --name PromptRewrite
          --onefile
          --add-data "index.html:."
          --add-data "src/prompt_rewrite/templates/*.yaml:prompt_rewrite/templates"
          --hidden-import prompt_rewrite
          --hidden-import prompt_rewrite.core
          --hidden-import prompt_rewrite.core.analyzer
          --hidden-import prompt_rewrite.core.pipeline
          --hidden-import prompt_rewrite.core.types
          --hidden-import prompt_rewrite.core.workflow_defs
          --hidden-import prompt_rewrite.strategies
          --hidden-import prompt_rewrite.strategies.base
          --hidden-import prompt_rewrite.strategies.role_enhancer
          --hidden-import prompt_rewrite.strategies.structure_formatter
          --hidden-import prompt_rewrite.strategies.chain_of_thought
          --hidden-import prompt_rewrite.strategies.constraint_injector
          --hidden-import prompt_rewrite.strategies.output_formatter
          --hidden-import prompt_rewrite.strategies.example_formatter
          --hidden-import prompt_rewrite.strategies.context_optimizer
          --hidden-import prompt_rewrite.llm
          --hidden-import prompt_rewrite.llm.deepseek_client
          --hidden-import prompt_rewrite.llm.llm_analyzer
          --hidden-import prompt_rewrite.llm.llm_strategies
          --hidden-import uvicorn
          --hidden-import uvicorn.logging
          --hidden-import uvicorn.loops
          --hidden-import uvicorn.loops.auto
          --hidden-import uvicorn.protocols
          --hidden-import uvicorn.protocols.http
          --hidden-import uvicorn.protocols.http.auto
          --hidden-import uvicorn.protocols.websockets
          --hidden-import uvicorn.protocols.websockets.auto
          --hidden-import uvicorn.lifespan
          --hidden-import uvicorn.lifespan.on
          --hidden-import fastapi
          --hidden-import pydantic
          launch_ui.py

      - name: Rename artifact
        shell: bash
        run: |
          mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} — Prompt Rewrite System"
          body_path: RELEASE_${{ github.ref_name }}.md
          draft: false
          prerelease: false
          files: |
            artifacts/PromptRewrite-windows.exe/PromptRewrite-windows.exe
            artifacts/PromptRewrite-macos/PromptRewrite-macos
            artifacts/PromptRewrite-linux/PromptRewrite-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
